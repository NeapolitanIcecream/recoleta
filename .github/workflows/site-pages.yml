name: site-pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/site-pages.yml
      - recoleta/**
      - site-content/**
      - pyproject.toml
      - uv.lock
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ hashFiles('site-content/**/*.md') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install system dependencies (Pillow build)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libjpeg-dev \
            zlib1g-dev \
            libpng-dev \
            libtiff-dev \
            libfreetype6-dev \
            liblcms2-dev \
            libwebp-dev \
            libopenjp2-7-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Verify staged trend content
        run: |
          uv run python - <<'PY'
          from pathlib import Path

          staged_root = Path("site-content")
          if not staged_root.is_dir():
              raise SystemExit(
                  "Missing site-content. Run `uv run recoleta site stage` locally and commit the staged trend notes first."
              )

          markdown_files = []
          direct_trends_dir = staged_root / "Trends"
          if direct_trends_dir.is_dir():
              markdown_files.extend(sorted(direct_trends_dir.glob("*.md")))

          streams_root = staged_root / "Streams"
          if streams_root.is_dir():
              for trends_dir in sorted(streams_root.glob("*/Trends")):
                  if trends_dir.is_dir():
                      markdown_files.extend(sorted(trends_dir.glob("*.md")))

          if not markdown_files:
              raise SystemExit(
                  "No staged trend markdown found in site-content. Run `uv run recoleta site stage` after generating trend notes."
              )
          print(f"staged trend notes: {len(markdown_files)}")
          PY

      - name: Build static site
        run: |
          uv run recoleta site build \
            --input-dir site-content \
            --output-dir site-dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
