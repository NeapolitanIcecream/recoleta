# Recoleta example configuration (non-secret).
#
# Copy this file to `recoleta.yaml`, then set:
#   RECOLETA_CONFIG_PATH="./recoleta.yaml"
#
# IMPORTANT: Do NOT put secrets (API keys, Telegram tokens) in this file.
# Secrets must come from environment variables only.

## Required

# Path to the SQLite DB file.
recoleta_db_path: "~/.local/share/recoleta/recoleta.db"

# LiteLLM model naming: <provider>/<model-identifier>
# Examples:
# - openai/gpt-5.4
# - anthropic/claude-3-5-sonnet-20241022
llm_model: "openai/gpt-5.4"

## Outputs (defaults shown)

# Publish targets (default: ["markdown"])
# Allowed: markdown, obsidian, telegram
# Manual trend email is configured separately under `email:`.
publish_targets:
  - markdown

# Local Markdown output directory (default: platform-specific user data dir + /outputs)
# markdown_output_dir: "~/.local/share/recoleta/outputs"

# Obsidian integration (required only when publish_targets includes "obsidian")
# obsidian_vault_path: "/absolute/path/to/your/ObsidianVault"
# obsidian_base_folder: "Recoleta"  # Default: "Recoleta"

# Manual trend email via Resend (preview/send only; not a publish target).
# Build and deploy the site first so `public_site_url` is reachable and
# `MARKDOWN_OUTPUT_DIR/.site-email-links.json` exists.
#
# email:
#   public_site_url: "https://example.github.io/recoleta"
#   from_email: "recoleta@example.com"
#   from_name: "Recoleta"
#   to:
#     - "you@example.com"
#   granularity: "week"
#   language_code: "en"
#   max_clusters: 3
#   max_evidence_per_cluster: 2
#   subject_prefix: "[Recoleta]"
#
# Env-only secret required for `recoleta run email send`:
#   RECOLETA_RESEND_API_KEY="re_replace_me"

## LLM behavior

# Optional canonical language hint for newly generated item summaries, trend briefs,
# and idea briefs. JSON keys remain English and topics remain concise English tags.
# llm_output_language: "English"  # Default: null

# Optional: derive translated output trees and a multilingual site from the canonical
# language above. `translate backfill` uses `legacy_backfill_source_language_code`
# when historical canonical content was written in another language.
#
# localization:
#   source_language_code: "en"
#   site_default_language_code: "en"
#   legacy_backfill_source_language_code: "zh-CN"
#   targets:
#     - code: "zh-CN"
#       llm_label: "Chinese (Simplified)"

## Topic and ranking configuration

# Topics are used for relevance scoring and optional semantic triage.
topics:
  - agents
  - ml-systems

# min_relevance_score: 0.6  # Default: 0.6
# max_deliveries_per_day: 10  # Default: 10

# Title dedup (RapidFuzz ratio)
# title_dedup_threshold: 92.0  # Default: 92.0
# title_dedup_max_candidates: 500  # Default: 500

# Tag filters (applied at publish time)
# allow_tags: []  # Default: []
# deny_tags: []  # Default: []

## Sources
#
# All sources are disabled by default. You must explicitly enable each source you want.
# If you configure a source block (e.g. set queries/feeds) without setting enabled=true,
# Recoleta fails fast to avoid silent "configured but not running" confusion.

sources:
  hn:
    enabled: true  # Default: false
    # Default rss_urls: ["https://news.ycombinator.com/rss"]
    rss_urls:
      - "https://news.ycombinator.com/rss"
    # max_items_per_feed: 50  # Default: 50
    # max_total_per_run: null  # Default: null (no overall cap)

  rss:
    enabled: false  # Default: false
    # feeds: []  # Required when enabled=true
    # feeds:
    #   - "https://example.com/feed.xml"
    # max_items_per_feed: 50  # Default: 50
    # max_total_per_run: null  # Default: null (no overall cap)

  arxiv:
    enabled: false  # Default: false
    # queries: []  # Required when enabled=true
    # queries:
    #   - "cat:cs.AI"
    # max_results_per_run: 50  # Default: 50
    # max_total_per_run: null  # Default: null (no overall cap)
    # enrich_method: "html_document"  # Default: "html_document" (pdf_text|latex_source|html_document)
    # enrich_failure_mode: "fallback"  # Default: "fallback" (fallback|strict)
    # html_document_max_concurrency: 4  # Default: 4
    # html_document_enable_parallel: true  # Default: true
    # html_document_skip_cleanup_when_complete: true  # Default: true
    # html_document_use_batched_db_writes: true  # Default: true
    # html_document_requests_per_second: 2.0  # Default: 2.0 (global throttle)
    # html_document_log_sample_rate: 0.05  # Default: 0.05 (sample per-item info logs in parallel mode)

  openreview:
    enabled: false  # Default: false
    # venues: []  # Required when enabled=true
    # venues:
    #   - "NeurIPS.cc/2026/Conference"
    # max_results_per_venue: 50  # Default: 50
    # max_total_per_run: null  # Default: null (no overall cap)

  hf_daily:
    enabled: false  # Default: false
    # max_items_per_run: 50  # Default: 50

## Semantic triage (optional)
#
# triage runs only when triage_enabled=true AND topics is non-empty.
# triage_enabled: false  # Default: false
# triage_mode: "prioritize"  # Default: "prioritize" (prioritize|filter)
# triage_embedding_model: "text-embedding-3-small"  # Default: "text-embedding-3-small"
# triage_embedding_dimensions: null  # Default: null
# triage_embedding_batch_max_inputs: 64  # Default: 64
# triage_embedding_batch_max_chars: 40000  # Default: 40000
# triage_query_mode: "joined"  # Default: "joined" (joined|max_per_topic)
# triage_candidate_factor: 5  # Default: 5
# triage_max_candidates: 500  # Default: 500
# triage_item_text_max_chars: 1200  # Default: 1200
# triage_min_similarity: 0.0  # Default: 0.0 (used only in filter mode)
# triage_exploration_rate: 0.05  # Default: 0.05
# triage_recency_floor: 5  # Default: 5

## Trends RAG (semantic search)
#
# LanceDB directory used as the local vector store for semantic search.
# rag_lancedb_dir: "~/.local/share/recoleta/lancedb"
#
# Embedding configuration used by trends semantic search and `recoleta rag *`.
# trends_embedding_model: "text-embedding-3-small"
# trends_embedding_dimensions: null
# trends_embedding_batch_max_inputs: 64
# trends_embedding_batch_max_chars: 40000
# trends_embedding_failure_mode: "continue"  # Default: "continue" (continue|fail_fast|threshold)
# trends_embedding_max_errors: 0  # Default: 0 (required >0 when failure_mode=threshold)
#
# Optional context-pack controls for `recoleta trends`.
# trends_self_similar_enabled: false  # Default: false
# trends_ranking_n: 10  # Default: 10
# trends_overview_pack_max_chars: 16000  # Default: 16000
# trends_item_overview_top_k: 28  # Default: 28
# trends_item_overview_item_max_chars: 800  # Default: 800
# trends_rep_min_per_cluster: 2  # Default: 2
# trends_peer_history_enabled: false  # Default: false
# trends_peer_history_window_count: 3  # Default: 3
# trends_peer_history_max_chars: 12000  # Default: 12000
# trends_evolution_max_signals: 5  # Default: 5

## Analysis limits

# analyze_limit: 100  # Default: 100
# analyze_write_batch_size: 32  # Default: 32
# analyze_content_max_chars: 32768  # Default: 32768 (set 0 to disable truncation)

## Workflow policy and daemon schedules

# workflows:
#   granularities:
#     default:
#       recursive_lower_levels: true  # Default: true
#       delivery_mode: all  # Allowed: all, local_only, none
#       translation: auto  # Allowed: auto, off
#       translate_include: [items, trends, ideas]
#       site_build: true
#       on_translate_failure: partial_success  # Allowed: fail, partial_success, skip
#     day: {}
#     week: {}
#     month: {}
#   deploy:
#     translation: auto
#     translate_include: [items, trends, ideas]
#     site_build: true
#     on_translate_failure: partial_success
#
# daemon:
#   schedules:
#     - workflow: day
#       interval_minutes: 60
#     - workflow: week
#       weekday: mon
#       hour_utc: 2
#       minute_utc: 0
#     - workflow: deploy
#       weekday: mon
#       hour_utc: 2
#       minute_utc: 30

## Logging and diagnostics

# log_level: "INFO"  # Default: "INFO"
# log_json: false  # Default: false

# If true, write scrubbed debug artifacts for failures and LLM calls.
# When enabled, artifacts_dir becomes required.
# write_debug_artifacts: false  # Default: false
# artifacts_dir: "/absolute/path/to/artifacts"  # Required when write_debug_artifacts=true
